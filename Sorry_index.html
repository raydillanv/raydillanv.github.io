    <script>
      // Dark mode icon swap
      function updateIconsForDarkMode() {
        const dark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.querySelector('a[href="https://twitter.com/DillanVictory"] img').src =
          dark ? "images/x-twitter-logo-white.png" : "images/X-logo-transparent-black-twitter.png";
        document.querySelector('a[href="https://github.com/raydillanv"] img').src =
          dark ? "images/github-white-icon.png" : "images/25231.png";
      }
      updateIconsForDarkMode();
      window.matchMedia("(prefers-color-scheme: dark)").addListener(updateIconsForDarkMode);

      // Background marquee builder
      (function buildMarquee() {
        const container = document.getElementById('bg-marquee');
        const rowHeight = 60;   // px between rows
        const rows = Math.ceil(window.innerHeight / rowHeight) + 3;

        // Alternate between the two strings, and alternate direction
        const texts = [
          'Dillan Victory',
          'ビクトリーディラン',
        ];

        for (let i = 0; i < rows; i++) {
          const ltr = i % 2 === 0;
          const text = texts[i % texts.length];

          // Repeat the string enough to fill two screen-widths (we translate -50% for seamless loop)
          const repeat = 12;
          const content = (text + '   ·   ').repeat(repeat);

          const row = document.createElement('div');
          row.className = `marquee-row ${ltr ? 'marquee-ltr' : 'marquee-rtl'}`;

          // Stagger start position so rows don't all begin at the same phase
          const duration = 28 + (i % 3) * 8;  // 28s / 36s / 44s cycling
          const delay = -(i * 3.5);             // negative delay = starts mid-animation

          row.style.cssText = `
            top: ${i * rowHeight}px;
            animation-duration: ${duration}s;
            animation-delay: ${delay}s;
          `;
          row.textContent = content;
          container.appendChild(row);
        }
      })();
    </script>
